services:
  traefik:
    image: traefik:v3.0
    container_name: oykus-traefik
    restart: unless-stopped
    env_file:
      - .env
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=websecure"
      - "--certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./oykus/traefik/acme.json:/acme.json
    networks:
      - oykus-public

  db:
    image: postgres:16
    container_name: oykus-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - oykus-internal

  bouncer:
    image: edoburu/pgbouncer:latest
    container_name: oykus-bouncer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    depends_on:
      - db
    networks:
      - oykus-internal

  backend:
    build: ./backend
    container_name: oykus-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - media_data:/app/media
      - static_data:/app/static
    networks:
      - oykus-internal
      - oykus-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`oykus.ovh`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
  
  assets:
    image: nginx:alpine
    container_name: oykus-assets
    restart: unless-stopped
    volumes:
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/app/media
      - static_data:/app/static
    networks:
      - oykus-public
      - oykus-internal
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.assets.rule=Host(oykus.ovh) && (PathPrefix(/media) || PathPrefix(/static))"
      - "traefik.http.routers.assets.entrypoints=websecure"
      - "traefik.http.routers.assets.tls.certresolver=le"
      - "traefik.http.services.assets.loadbalancer.server.port=80"

  frontend:
    image: nginx:alpine
    container_name: oykus-frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - oykus-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`oykus.ovh`) && PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/media`) && !PathPrefix(`/static`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

volumes:
  pgdata:
  media_data:
  static_data:

networks:
  oykus-internal:
    driver: bridge
  oykus-public:
    driver: bridge